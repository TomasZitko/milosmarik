<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Stránka nenalezena | Miloš Mařík - Osobní Trenér</title>
    <meta name="robots" content="noindex, nofollow">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --hero-navy: #080b01;
            --hero-charcoal: #000000;
            --hero-gold: #181a16;
            --hero-white: #ffffff;
            --hero-text-color: #2c2c2c;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--hero-white);
            color: var(--hero-text-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .error-container {
            text-align: center;
            max-width: 600px;
            padding: 40px 20px;
        }
        
        .error-number {
            font-family: 'Playfair Display', serif;
            font-size: 8rem;
            font-weight: 700;
            color: var(--hero-navy);
            line-height: 1;
            margin-bottom: 20px;
        }
        
        .error-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--hero-navy);
            margin-bottom: 20px;
        }
        
        .error-message {
            font-size: 1.1rem;
            color: var(--hero-text-color);
            margin-bottom: 40px;
            line-height: 1.6;
        }
        
        .error-actions {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            display: inline-block;
            padding: 12px 32px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 1px solid var(--hero-navy);
            color: var(--hero-navy);
            background-color: transparent;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }
        
        .btn:hover {
            background-color: var(--hero-navy);
            color: var(--hero-white);
        }
        
        .btn-primary {
            background-color: var(--hero-navy);
            color: var(--hero-white);
        }
        
        .btn-primary:hover {
            background-color: var(--hero-gold);
            color: var(--hero-navy);
            border-color: var(--hero-gold);
        }
        
        @media (max-width: 768px) {
            .error-number {
                font-size: 6rem;
            }
            
            .error-title {
                font-size: 2rem;
            }
            
            .error-actions {
                flex-direction: column;
                align-items: center;
            }
            
            .btn {
                width: 100%;
                max-width: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-number">404</div>
        <h1 class="error-title">Stránka nenalezena</h1>
        <p class="error-message">
            Omlouváme se, ale stránka, kterou hledáte, neexistuje nebo byla přesunuta. 
            Možná jste zadali špatnou adresu nebo je odkaz zastaralý.
        </p>
        <div class="error-actions">
            <a href="/" class="btn btn-primary">Zpět na hlavní stránku</a>
            <a href="/#contact" class="btn">Kontaktujte mě</a>
        </div>
    </div>
</body>
</html>
